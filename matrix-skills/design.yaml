# ============================================================================
# UI/UX design, visual design, user experience, accessibility
# Primary agents: designer, frontend-engineer
# ============================================================================

domain: design
name: "UI/UX Design"
description: "Visual design, user experience, accessibility"
skill_count: 10

skills:
