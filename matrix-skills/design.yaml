  - skill_id: ui-styling
    category: core
    priority_score: 8
    relevance_mapping:
      agents: [designer, frontend-engineer]
      profiles: ["design:*", "frontend:execution"]
    description: "shadcn/ui, Tailwind CSS, accessible components"

  - skill_id: mobile-design
    category: specialized
    priority_score: 8
    relevance_mapping:
      agents: [designer, mobile-engineer]
      profiles: ["design:creative", "mobile:execution"]
