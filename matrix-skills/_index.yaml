# ============================================================================
# MATRIX SKILLS INDEX v1.0
# ============================================================================
# Central registry for the distributed Matrix Skill Discovery System.
#
# ARCHITECTURE:
#   Each domain has its own file: {domain}.yaml
#   Agents reference specific domain files based on their profile.
#
# TOTAL: 310 skills across 19 domains
#
# USAGE:
#   1. Agent declares profile in frontmatter (e.g., "backend:execution")
#   2. System loads relevant domain files based on agent's inherit_from
#   3. Skills are injected based on relevance_mapping and priority
# ============================================================================

