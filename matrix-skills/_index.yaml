# ============================================================================
# RESOLUTION RULES
# ============================================================================
resolution:
  precedence:
    - direct_agent_match
    - profile_match
    - domain_inheritance

  wildcards:
    "*:orchestration": "Any domain with orchestration category"
    "backend:*": "All backend categories"
    "*": "Universal (all agents)"

  thresholds:
    minimum_priority: 5
    core_priority: 7
    critical_priority: 9

